name: Visual regression — eGFR chart (LKID-81)

# Runs the Playwright visual-regression suite against the committed chart
# baselines. Triggers ONLY on PRs that could change the chart, so we don't
# burn CI minutes on docs PRs or backend-only changes.
#
# No backend is started — the spec mocks the `GET /results/{token}` fetch
# via `page.route`. Only `next dev` is required.
#
# A `workflow_dispatch` mode regenerates baselines on a Linux runner and
# pushes them back to the PR branch. Use it after an intentional chart
# change instead of committing macOS-generated PNGs.

on:
  pull_request:
    paths:
      - "app/src/components/chart/**"
      - "app/src/app/results/**"
      - "app/src/components/results/**"
      - "app/tests/visual/**"
      - "app/playwright.visual.config.ts"
      - "app/package.json"
      - "app/package-lock.json"
      - ".github/workflows/visual-regression.yml"
  workflow_dispatch:
    inputs:
      update-baselines:
        description: "Regenerate baselines on Linux and commit back to the branch"
        type: boolean
        default: false

# Default least-privilege permissions. The PR validation job inherits these.
# The update-baselines job overrides with `contents: write` at job level.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # PR validation — verify against committed baselines (default mode).
  # Read-only; runs on every chart-touching PR.
  # ------------------------------------------------------------------
  visual:
    name: Run visual regression
    if: github.event_name != 'workflow_dispatch' || !inputs['update-baselines']
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}

      - name: Install Chromium (with system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium (system deps only, browser cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run visual-regression suite
        run: npm run test:visual
        env:
          CI: "true"

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            app/tests/visual/test-results/
            app/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # Update baselines — workflow_dispatch only, requires `contents: write`.
  # Regenerates PNGs on Linux and pushes them back to the dispatched branch.
  # Use after an intentional chart change instead of committing macOS PNGs.
  # ------------------------------------------------------------------
  update-baselines:
    name: Update baselines
    if: github.event_name == 'workflow_dispatch' && inputs['update-baselines']
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: read

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}

      - name: Install Chromium (with system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium (system deps only, browser cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Regenerate baselines
        run: npm run test:visual:update
        env:
          CI: "true"

      - name: Commit refreshed baselines
        working-directory: .
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- app/tests/visual/snapshots/; then
            echo "No baseline changes — nothing to commit."
            exit 0
          fi
          git add app/tests/visual/snapshots/
          git commit -m "test(LKID-81): regenerate visual-regression baselines on CI runner

          Auto-generated by the visual-regression / update-baselines
          workflow_dispatch run. Review the PNGs and squash-merge as part
          of the parent design-change PR."
          git push
