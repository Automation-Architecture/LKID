name: Accessibility — axe-core audit (LKID-94)

# Runs the Playwright axe-core accessibility suite on every PR that could
# affect rendered output. No backend is started — the suite mocks all API
# calls via `page.route`. Only `next dev` is required.
#
# No snapshot files, so no workflow_dispatch baseline-regen job is needed.

on:
  pull_request:
    paths:
      - "app/src/**"
      - "app/tests/a11y/**"
      - "app/playwright.a11y.config.ts"
      - "app/package.json"
      - "app/package-lock.json"
      - ".github/workflows/accessibility.yml"

# Default least-privilege permissions.
permissions:
  contents: read

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Run axe-core accessibility audit on every frontend-touching PR.
  # ------------------------------------------------------------------
  a11y:
    name: Run accessibility suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/package-lock.json') }}

      - name: Install Chromium (with system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium (system deps only, browser cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run accessibility suite
        run: npm run test:a11y
        env:
          CI: "true"

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: |
            app/tests/a11y/test-results/
            app/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
